name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-15-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.7.0"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Setup Python (for dmgbuild)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS DMG (thin)
        env:
          GPG_KEY_ID: ""
        run: bash build/build-electron-mac.sh

      - name: Import GPG key
        if: ${{ vars.GPG_SIGNING_ENABLED == 'true' }}
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Sign artifacts
        if: ${{ vars.GPG_SIGNING_ENABLED == 'true' }}
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: bash build/sign-electron-artifacts.sh dashboard/release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            dashboard/release/*.dmg
            dashboard/release/*.yml
            dashboard/release/*.asc
          if-no-files-found: error

  create-release:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: ls -lh release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          files: release-artifacts/*
